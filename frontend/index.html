<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/artspace-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ArtSpace — Build Your Creative Shop Online</title>
    <meta name="description" content="Create your free online shop in minutes. Built for nail artists, jewellers, bakers, mehendi artists and more." />

    <!-- Open Graph (WhatsApp, Facebook, Instagram DM) -->
    <meta property="og:type"         content="website" />
    <meta property="og:url"          content="https://artspace-online.netlify.app/" />
    <meta property="og:title"        content="ArtSpace — Build Your Creative Shop Online" />
    <meta property="og:description"  content="Create your free online shop in minutes. Built for nail artists, jewellers, bakers, mehendi artists and more." />
    <meta property="og:image"        content="https://artspace-online.netlify.app/artspace-logo.png" />
    <meta property="og:image:width"  content="512" />
    <meta property="og:image:height" content="512" />

    <!-- Twitter card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="ArtSpace — Build Your Creative Shop Online" />
    <meta name="twitter:description" content="Create your free online shop in minutes. Built for nail artists, jewellers, bakers, mehendi artists and more." />
    <meta name="twitter:image"       content="https://artspace-online.netlify.app/artspace-logo.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Tiptap editor prose styles */
      .ProseMirror { outline: none; }
      .ProseMirror p.is-editor-empty:first-child::before {
        color: #9ca3af;
        content: attr(data-placeholder);
        float: left;
        height: 0;
        pointer-events: none;
      }
      /* Public blog post prose */
      .prose h2 { font-size: 1.25rem; font-weight: 600; margin: 1.5rem 0 0.75rem; }
      .prose h3 { font-size: 1.1rem; font-weight: 600; margin: 1.25rem 0 0.5rem; }
      .prose p  { margin-bottom: 1rem; color: #374151; }
      .prose ul, .prose ol { padding-left: 1.5rem; margin-bottom: 1rem; }
      .prose ul { list-style: disc; }
      .prose ol { list-style: decimal; }
      .prose li { margin-bottom: 0.25rem; color: #374151; }
      .prose blockquote { border-left: 3px solid #e5e7eb; padding-left: 1rem; color: #6b7280; font-style: italic; margin: 1rem 0; }
      .prose hr { border-color: #e5e7eb; margin: 1.5rem 0; }
      .prose a { color: #7c3aed; text-decoration: underline; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
